<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #fafafa; }
        .form-container { max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; background: #fff; }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #333; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 3px; font-weight: bold; }
        button:hover { background-color: #111; }
        .link-note { text-align: center; margin-top: 15px; font-size: 14px; }
        .link-note a { color: green; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Login Page</h2>
        <form action="services.html" method="get">
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
        
        <p class="link-note">
            New user? <a href="register.html">Register here</a><br><br>
            <a href="services.html">Skip directly to Services Page →</a>
        </p>
    </div>

</body>
</html>
